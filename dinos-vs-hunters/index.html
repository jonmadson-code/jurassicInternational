<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinos vs Hunters</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #04060f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas { display: block; cursor: crosshair; }
        #back {
            position: fixed;
            top: 10px;
            right: 14px;
            color: rgba(255,255,255,0.28);
            font-size: 12px;
            font-family: monospace;
            text-decoration: none;
            z-index: 10;
        }
        #back:hover { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
<a href="../index.html" id="back">← Jurassic International</a>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

const TOP = 44;  // arena top margin (UI bar)
const BOT = 32;  // arena bottom margin (gauge bar)

function resize() {
    const mw = Math.min(window.innerWidth,  920);
    const mh = Math.min(window.innerHeight - 20, 575);
    let w = mw, h = w / 1.6;
    if (h > mh) { h = mh; w = h * 1.6; }
    W = canvas.width  = Math.floor(w);
    H = canvas.height = Math.floor(h);
}
resize();
window.addEventListener('resize', () => { resize(); if (state === 'playing') rebuildCover(); });

// ─── Input ──────────────────────────────────────────────────
const keys  = {};
const mouse = { x: 0, y: 0, held: false };
let   clickThisFrame = false;

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    if (e.code === 'Space' && state === 'menu')     goSelect();
    if (e.code === 'Enter' && state === 'gameover') goSelect();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) { mouse.held = true;  clickThisFrame = true; } });
canvas.addEventListener('mouseup',   e => { if (e.button === 0)   mouse.held = false; });

canvas.addEventListener('click', e => {
    const ox = e.offsetX, oy = e.offsetY;
    if (state === 'menu')     { goSelect(); return; }
    if (state === 'gameover') { goSelect(); return; }
    if (state === 'select') {
        const { dx, dy, hx, hy, cw, ch } = selectLayout();
        if (ox >= dx && ox <= dx + cw && oy >= dy && oy <= dy + ch) startGame('dino');
        if (ox >= hx && ox <= hx + cw && oy >= hy && oy <= hy + ch) startGame('hunter');
        return;
    }
    if (state === 'diffselect') {
        const { nx, px, mx, cy, cw, ch } = diffLayout();
        if (ox >= nx && ox <= nx + cw && oy >= cy && oy <= cy + ch) startWithDifficulty('noob');
        if (ox >= px && ox <= px + cw && oy >= cy && oy <= cy + ch) startWithDifficulty('pro');
        if (ox >= mx && ox <= mx + cw && oy >= cy && oy <= cy + ch) startWithDifficulty('master');
    }
});

function selectLayout() {
    const cw = W * 0.30, ch = H * 0.56;
    const dy = H * 0.22, hy = H * 0.22;
    const dx = W * 0.13, hx = W * 0.57;
    return { dx, dy, hx, hy, cw, ch };
}

function diffLayout() {
    const cw = W * 0.24, ch = H * 0.55, cy = H * 0.23;
    const nx = W * 0.06, px = W * 0.06 + cw + W * 0.04, mx = W * 0.06 + (cw + W * 0.04) * 2;
    return { nx, px, mx, cy, cw, ch };
}

// ─── Difficulty config ───────────────────────────────────────
const DIFFICULTY = {
    noob: {
        dinoHp: 120,  dinoSpeed: 2.4,
        dinoBiteCd: 70,  dinoBiteDmg: 13,
        dinoChaseRange: 240, dinoWanderRange: 280,
        dinoChargeSpeed: 9,  dinoChargeDmg: 28,
        hunterHp: 80,  hunterShootCd: 70,
        hunterSpread: 38, hunterBulletSpd: 7.5,
        hunterRange: 230, hunterRetreat: 130,
        hunterStrafeSpd: 0.016
    },
    pro: {
        dinoHp: 150,  dinoSpeed: 3.2,
        dinoBiteCd: 52,  dinoBiteDmg: 20,
        dinoChaseRange: 300, dinoWanderRange: 340,
        dinoChargeSpeed: 12, dinoChargeDmg: 42,
        hunterHp: 100, hunterShootCd: 44,
        hunterSpread: 22, hunterBulletSpd: 9.5,
        hunterRange: 185, hunterRetreat: 95,
        hunterStrafeSpd: 0.024
    },
    master: {
        dinoHp: 190,  dinoSpeed: 4.4,
        dinoBiteCd: 36,  dinoBiteDmg: 30,
        dinoChaseRange: 380, dinoWanderRange: 420,
        dinoChargeSpeed: 15, dinoChargeDmg: 58,
        hunterHp: 130, hunterShootCd: 26,
        hunterSpread: 8,  hunterBulletSpd: 12,
        hunterRange: 150, hunterRetreat: 65,
        hunterStrafeSpd: 0.034
    }
};

// ─── State ──────────────────────────────────────────────────
let state      = 'menu';   // menu | select | diffselect | playing | gameover
let playerRole = 'dino';
let difficulty = 'pro';
let winner     = '';
let frame      = 0;
let gameTimer  = 0;
let screenShake = 0;
const GAME_FRAMES = 120 * 60;

let player, enemy, bullets, particles, cover;

// ─── Cover blocks ────────────────────────────────────────────
function rebuildCover() {
    const defs = [
        { fx: 0.18, fy: 0.30, fw: 72, fh: 38 },
        { fx: 0.40, fy: 0.62, fw: 58, fh: 44 },
        { fx: 0.62, fy: 0.25, fw: 66, fh: 36 },
        { fx: 0.80, fy: 0.52, fw: 52, fh: 50 },
        { fx: 0.28, fy: 0.48, fw: 60, fh: 38 },
        { fx: 0.52, fy: 0.70, fw: 55, fh: 34 },
        { fx: 0.72, fy: 0.38, fw: 46, fh: 48 },
    ];
    const AY = TOP, AH = H - TOP - BOT;
    cover = defs.map(d => ({
        x: W * d.fx - d.fw / 2,
        y: AY + AH * (d.fy - 0.5) + AH / 2 - d.fh / 2,
        w: d.fw, h: d.fh
    }));
}

// ─── Entity factories ────────────────────────────────────────
function makeDino(x, y, isPlayer) {
    const cfg = DIFFICULTY[difficulty];
    const hp  = isPlayer ? 150 : cfg.dinoHp;
    const spd = isPlayer ? 3.2 : cfg.dinoSpeed;
    return {
        role: 'dino', isPlayer, x, y, r: 22,
        hp, maxHp: hp, speed: spd,
        rage: 0, maxRage: 100,
        rageActive: false, rageVx: 0, rageVy: 0, rageDist: 0, rageCd: 0,
        biteCd: 0, stunTimer: 0, hitFlash: 0, facing: 1,
        aiState: 'chase', aiTimer: 0, wanderAngle: Math.random() * Math.PI * 2
    };
}

function makeHunter(x, y, isPlayer) {
    const cfg = DIFFICULTY[difficulty];
    const hp  = isPlayer ? 100 : cfg.hunterHp;
    return {
        role: 'hunter', isPlayer, x, y, r: 15,
        hp, maxHp: hp, speed: 4.0,
        shootCd: 0, empCd: 0, empCharges: 3,
        hitFlash: 0, facing: -1,
        aiState: 'strafe', aiTimer: 0, strafeAngle: Math.PI,
        aimAngle: Math.PI
    };
}

function makeBullet(x, y, vx, vy, owner) {
    return { x, y, vx, vy, owner, life: 90 };
}

function makeParticle(x, y, color, vx, vy, life) {
    return { x, y, color, vx, vy, life, maxLife: life };
}

function burst(x, y, color, n, speed = 3) {
    for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = speed * (0.4 + Math.random() * 0.6);
        particles.push(makeParticle(x, y, color, Math.cos(a)*s, Math.sin(a)*s, 18 + Math.random()*18));
    }
}

// ─── Collision helpers ───────────────────────────────────────
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
    const nx = Math.max(rx, Math.min(cx, rx + rw));
    const ny = Math.max(ry, Math.min(cy, ry + rh));
    return (cx-nx)*(cx-nx)+(cy-ny)*(cy-ny) < cr*cr;
}

function dist2(a, b) { return (a.x-b.x)**2 + (a.y-b.y)**2; }
function dist(a, b)  { return Math.sqrt(dist2(a,b)); }

function move(ent, vx, vy) {
    let nx = ent.x + vx;
    let ny = ent.y + vy;
    // Arena bounds
    nx = Math.max(ent.r, Math.min(W - ent.r, nx));
    ny = Math.max(TOP + ent.r, Math.min(H - BOT - ent.r, ny));
    // Cover sliding
    for (const c of cover) {
        if (!circleRect(nx, ny, ent.r, c.x, c.y, c.w, c.h)) continue;
        // Try x-only
        if (!circleRect(nx, ent.y, ent.r, c.x, c.y, c.w, c.h)) { ny = ent.y; }
        // Try y-only
        else if (!circleRect(ent.x, ny, ent.r, c.x, c.y, c.w, c.h)) { nx = ent.x; }
        // Blocked both axes
        else { nx = ent.x; ny = ent.y; }
        break;
    }
    ent.x = nx; ent.y = ny;
}

// ─── Damage ──────────────────────────────────────────────────
function damage(target, amount) {
    if (target.role === 'dino' && target.rageActive) return; // invuln during charge
    target.hp        = Math.max(0, target.hp - amount);
    target.hitFlash  = 14;
    if (target.role === 'dino') target.rage = Math.min(target.maxRage, target.rage + 13);
    const col = target.role === 'dino' ? '#39ff14' : '#ff4500';
    burst(target.x, target.y, col, 6);
    screenShake = Math.max(screenShake, amount < 20 ? 3 : 6);
}

// ─── Player: Dino ────────────────────────────────────────────
function updatePlayerDino() {
    const p = player;
    if (p.stunTimer > 0) { p.stunTimer--; return; }

    if (p.rageActive) {
        p.x += p.rageVx; p.y += p.rageVy;
        p.rageDist -= Math.hypot(p.rageVx, p.rageVy);
        p.x = Math.max(p.r, Math.min(W-p.r, p.x));
        p.y = Math.max(TOP+p.r, Math.min(H-BOT-p.r, p.y));
        burst(p.x, p.y, '#39ff14', 2, 2);
        if (dist(p, enemy) < p.r + enemy.r + 4) { damage(enemy, 42); endCharge(p); }
        if (p.rageDist <= 0) endCharge(p);
        return;
    }

    let vx = 0, vy = 0;
    if (keys['KeyA'] || keys['ArrowLeft'])  vx -= p.speed;
    if (keys['KeyD'] || keys['ArrowRight']) vx += p.speed;
    if (keys['KeyW'] || keys['ArrowUp'])    vy -= p.speed;
    if (keys['KeyS'] || keys['ArrowDown'])  vy += p.speed;
    if (vx && vy) { vx *= 0.707; vy *= 0.707; }
    if (vx) p.facing = vx > 0 ? 1 : -1;
    move(p, vx, vy);

    if (p.biteCd > 0) p.biteCd--;
    if ((keys['Space'] || keys['KeyF']) && p.biteCd === 0) {
        p.biteCd = 46;
        if (dist(p, enemy) < p.r + enemy.r + 52) {
            damage(enemy, 26);
            p.rage = Math.min(p.maxRage, p.rage + 8);
        }
    }

    if (p.rageCd > 0) p.rageCd--;
    if (keys['KeyQ'] && p.rage >= p.maxRage && p.rageCd === 0) triggerCharge(p);
}

function triggerCharge(p) {
    let dx = 0, dy = 0;
    if (keys['KeyA'] || keys['ArrowLeft'])  dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
    if (keys['KeyW'] || keys['ArrowUp'])    dy -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  dy += 1;
    if (!dx && !dy) { dx = p.facing; }
    const len = Math.hypot(dx, dy) || 1;
    p.rageActive = true;
    p.rageVx = (dx/len) * 12;
    p.rageVy = (dy/len) * 12;
    p.rageDist = 190;
    p.rage = 0;
    p.rageCd = 100;
    burst(p.x, p.y, '#39ff14', 18, 5);
    screenShake = 8;
}

function endCharge(p) {
    p.rageActive = false;
    p.rageVx = p.rageVy = p.rageDist = 0;
}

// ─── Player: Hunter ──────────────────────────────────────────
function updatePlayerHunter() {
    const p = player;

    let vx = 0, vy = 0;
    if (keys['KeyA'] || keys['ArrowLeft'])  vx -= p.speed;
    if (keys['KeyD'] || keys['ArrowRight']) vx += p.speed;
    if (keys['KeyW'] || keys['ArrowUp'])    vy -= p.speed;
    if (keys['KeyS'] || keys['ArrowDown'])  vy += p.speed;
    if (vx && vy) { vx *= 0.707; vy *= 0.707; }
    if (vx) p.facing = vx > 0 ? 1 : -1;
    move(p, vx, vy);

    p.aimAngle = Math.atan2(mouse.y - p.y, mouse.x - p.x);

    if (p.shootCd > 0) p.shootCd--;
    if (mouse.held && p.shootCd === 0) {
        p.shootCd = 16;
        const dx = mouse.x - p.x, dy = mouse.y - p.y;
        const len = Math.hypot(dx, dy) || 1;
        bullets.push(makeBullet(p.x, p.y, (dx/len)*11, (dy/len)*11, 'player'));
        burst(p.x, p.y, '#ff7030', 2, 2);
    }

    if (p.empCd > 0) p.empCd--;
    if (keys['KeyQ'] && p.empCd === 0 && p.empCharges > 0) {
        p.empCd = 180;
        p.empCharges--;
        enemy.stunTimer = 115;
        burst(enemy.x, enemy.y, '#00cfff', 22, 4);
        screenShake = 5;
    }
}

// ─── AI: Dino ────────────────────────────────────────────────
function updateDinoAI() {
    const e = enemy, p = player;
    const cfg = DIFFICULTY[difficulty];
    if (e.stunTimer > 0) { e.stunTimer--; return; }

    if (e.rageActive) {
        e.x += e.rageVx; e.y += e.rageVy;
        e.rageDist -= Math.hypot(e.rageVx, e.rageVy);
        e.x = Math.max(e.r, Math.min(W-e.r, e.x));
        e.y = Math.max(TOP+e.r, Math.min(H-BOT-e.r, e.y));
        burst(e.x, e.y, '#39ff14', 2, 2);
        if (dist(e, p) < e.r + p.r + 4) { damage(p, cfg.dinoChargeDmg); endCharge(e); }
        if (e.rageDist <= 0) endCharge(e);
        return;
    }

    const d = dist(e, p);
    if (e.aiTimer > 0) e.aiTimer--;

    if (e.aiState === 'wander' && d < cfg.dinoChaseRange)  e.aiState = 'chase';
    if (e.aiState === 'chase'  && d > cfg.dinoWanderRange) e.aiState = 'wander';

    if (e.aiState === 'wander') {
        if (e.aiTimer <= 0) {
            e.wanderAngle += (Math.random() - 0.5) * 1.8;
            e.aiTimer = 30 + Math.random() * 50;
        }
        move(e, Math.cos(e.wanderAngle) * e.speed * 0.55, Math.sin(e.wanderAngle) * e.speed * 0.55);
    } else {
        const dx = p.x - e.x, dy = p.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        move(e, (dx/len) * e.speed, (dy/len) * e.speed);
        if (dx) e.facing = dx > 0 ? 1 : -1;

        if (e.biteCd > 0) e.biteCd--;
        if (d < e.r + p.r + 44 && e.biteCd === 0) {
            e.biteCd = cfg.dinoBiteCd;
            damage(p, cfg.dinoBiteDmg);
            e.rage = Math.min(e.maxRage, e.rage + 10);
        }
    }

    if (e.rageCd > 0) e.rageCd--;
    if (e.rage >= e.maxRage && e.rageCd === 0) {
        const dx = p.x - e.x, dy = p.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        e.rageActive = true;
        e.rageVx = (dx/len) * cfg.dinoChargeSpeed;
        e.rageVy = (dy/len) * cfg.dinoChargeSpeed;
        e.rageDist = 190;
        e.rage = 0;
        e.rageCd = 100;
        burst(e.x, e.y, '#39ff14', 18, 5);
        screenShake = 8;
    }
}

// ─── AI: Hunter ──────────────────────────────────────────────
function updateHunterAI() {
    const e = enemy, p = player;
    const cfg = DIFFICULTY[difficulty];
    const d = dist(e, p);
    e.strafeAngle += cfg.hunterStrafeSpd;

    const preferredRange = cfg.hunterRange;
    let tx = p.x + Math.cos(e.strafeAngle) * preferredRange;
    let ty = p.y + Math.sin(e.strafeAngle) * preferredRange;
    tx = Math.max(e.r + 8, Math.min(W - e.r - 8, tx));
    ty = Math.max(TOP + e.r + 8, Math.min(H - BOT - e.r - 8, ty));

    const dx = tx - e.x, dy = ty - e.y;
    const len = Math.hypot(dx, dy) || 1;
    move(e, (dx/len) * Math.min(e.speed, len * 0.18 + 1.5), (dy/len) * Math.min(e.speed, len * 0.18 + 1.5));
    if (dx) e.facing = dx > 0 ? 1 : -1;

    if (d < cfg.hunterRetreat) {
        const rx = e.x - p.x, ry = e.y - p.y;
        const rl = Math.hypot(rx, ry) || 1;
        move(e, (rx/rl) * e.speed * 1.6, (ry/rl) * e.speed * 1.6);
    }

    e.aimAngle = Math.atan2(p.y - e.y, p.x - e.x);

    if (e.shootCd > 0) e.shootCd--;
    if (e.shootCd === 0) {
        e.shootCd = cfg.hunterShootCd;
        const spread = (Math.random() - 0.5) * cfg.hunterSpread;
        const adx = p.x - e.x + spread, ady = p.y - e.y + spread;
        const al = Math.hypot(adx, ady) || 1;
        bullets.push(makeBullet(e.x, e.y, (adx/al)*cfg.hunterBulletSpd, (ady/al)*cfg.hunterBulletSpd, 'enemy'));
    }
}

// ─── Bullets ─────────────────────────────────────────────────
function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;

        if (b.x < 0 || b.x > W || b.y < 0 || b.y > H || b.life <= 0) {
            bullets.splice(i, 1); continue;
        }
        let hitCover = false;
        for (const c of cover) {
            if (b.x >= c.x && b.x <= c.x + c.w && b.y >= c.y && b.y <= c.y + c.h) {
                burst(b.x, b.y, '#888', 2, 2); hitCover = true; break;
            }
        }
        if (hitCover) { bullets.splice(i, 1); continue; }

        const target = b.owner === 'player' ? enemy : player;
        if (dist(b, target) < target.r + 6) {
            damage(target, 15);
            bullets.splice(i, 1);
        }
    }
}

// ─── Particles ───────────────────────────────────────────────
function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.88; p.vy *= 0.88;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// ─── Draw: Arena ─────────────────────────────────────────────
function drawFloor() {
    ctx.fillStyle = '#04060f';
    ctx.fillRect(0, 0, W, H);

    const g = Math.floor(W / 20);
    ctx.lineWidth = 0.5;

    ctx.strokeStyle = 'rgba(0,255,160,0.055)';
    for (let x = 0; x <= W; x += g) {
        ctx.beginPath(); ctx.moveTo(x, TOP); ctx.lineTo(x, H - BOT); ctx.stroke();
    }
    for (let y = TOP; y <= H - BOT; y += g) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(140,0,255,0.03)';
    for (let i = -H; i < W + H; i += g * 3) {
        ctx.beginPath(); ctx.moveTo(i, TOP); ctx.lineTo(i + H, H - BOT); ctx.stroke();
    }

    // Arena border glow
    ctx.strokeStyle = 'rgba(0,200,255,0.14)';
    ctx.lineWidth = 1;
    ctx.strokeRect(0, TOP, W, H - TOP - BOT);
}

function drawCover() {
    for (const c of cover) {
        ctx.fillStyle = '#090c1a';
        ctx.fillRect(c.x, c.y, c.w, c.h);

        ctx.strokeStyle = 'rgba(0,210,255,0.55)';
        ctx.lineWidth = 1;
        ctx.strokeRect(c.x, c.y, c.w, c.h);

        // Neon top strip
        ctx.fillStyle = 'rgba(0,210,255,0.09)';
        ctx.fillRect(c.x, c.y, c.w, 2.5);

        // Corner accent dots
        ctx.fillStyle = 'rgba(0,210,255,0.4)';
        [[c.x, c.y],[c.x+c.w, c.y],[c.x, c.y+c.h],[c.x+c.w, c.y+c.h]].forEach(([px,py]) => {
            ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fill();
        });
    }
}

// ─── Draw: Characters ────────────────────────────────────────
function drawDino(ent) {
    const { x, y, r, facing, hitFlash, rageActive, rage, maxRage, stunTimer } = ent;
    const rr = rage / maxRage;

    ctx.save();
    ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);

    // Stun rings
    if (stunTimer > 0) {
        ctx.strokeStyle = `rgba(0,200,255,${0.5 + 0.4 * Math.sin(frame * 0.3)})`;
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(0, -r - 8 - i * 7, 5, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    // Glow
    if (rageActive) {
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur = 28;
    } else if (rr > 0.6) {
        ctx.shadowColor = `rgba(57,255,20,${(rr - 0.6) * 2})`;
        ctx.shadowBlur = 14;
    } else {
        ctx.shadowColor = '#1a6008';
        ctx.shadowBlur = 6;
    }

    const flash = hitFlash > 0 && (hitFlash % 4 < 2);

    // Tail
    const tailCol = flash ? '#fff' : (rageActive ? '#aaffaa' : '#2a7010');
    ctx.strokeStyle = tailCol;
    ctx.lineWidth   = r * 0.38;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(-r * 0.95, r * 0.08);
    ctx.quadraticCurveTo(-r * 1.6, r * 0.42, -r * 1.95, r * 0.0);
    ctx.stroke();

    const bodyCol = flash ? '#fff' : (rageActive ? '#88ff44' : '#3ba018');

    // Body
    ctx.fillStyle = bodyCol;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.22, r * 0.88, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = bodyCol;
    ctx.beginPath();
    ctx.ellipse(r * 1.02, -r * 0.52, r * 0.74, r * 0.54, 0.28, 0, Math.PI * 2);
    ctx.fill();

    // Jaw
    ctx.beginPath();
    ctx.ellipse(r * 1.28, -r * 0.32, r * 0.5, r * 0.22, 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Teeth
    if (!flash) {
        ctx.fillStyle = '#d4ffb0';
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(r * (0.9 + i * 0.22), -r * 0.18);
            ctx.lineTo(r * (0.84 + i * 0.22), -r * 0.08);
            ctx.lineTo(r * (0.98 + i * 0.22), -r * 0.08);
            ctx.closePath();
            ctx.fill();
        }
    }

    // Eye
    ctx.fillStyle = rageActive ? '#ff1111' : (flash ? '#fff' : '#e0ffb0');
    ctx.beginPath();
    ctx.arc(r * 1.44, -r * 0.68, r * 0.13, 0, Math.PI * 2);
    ctx.fill();
    if (!flash) {
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(r * 1.46, -r * 0.68, r * 0.06, 0, Math.PI * 2);
        ctx.fill();
    }

    // Tiny arms
    ctx.fillStyle = bodyCol;
    ctx.beginPath();
    ctx.ellipse(r * 0.38, -r * 0.1, r * 0.22, r * 0.13, 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-r * 0.28, r * 0.62, r * 0.32, r * 0.6);
    ctx.fillRect(r * 0.08, r * 0.68, r * 0.30, r * 0.55);
    // Feet
    ctx.fillRect(-r * 0.36, r * 1.18, r * 0.44, r * 0.14);
    ctx.fillRect(r * 0.02, r * 1.18, r * 0.42, r * 0.14);

    ctx.restore();

    // Rage charge ring
    if (rageActive) {
        ctx.save();
        ctx.strokeStyle = '#39ff14';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(x, y, r + 9 + Math.sin(frame * 0.3) * 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }

    ent.hitFlash = Math.max(0, ent.hitFlash - 1);
}

function drawHunter(ent) {
    const { x, y, r, facing, hitFlash, aimAngle } = ent;
    const flash = hitFlash > 0 && (hitFlash % 4 < 2);

    ctx.save();
    ctx.translate(x, y);

    const armCol    = flash ? '#fff' : '#0e1020';
    const accentCol = flash ? '#fff' : '#cc2a00';
    const visorCol  = flash ? '#fff' : '#ff5a20';

    // Body glow
    ctx.shadowColor = '#ff4500';
    ctx.shadowBlur  = 10;

    // Rifle (drawn first so body overlaps)
    ctx.save();
    ctx.rotate(aimAngle);
    ctx.fillStyle = flash ? '#fff' : '#6a6a7a';
    ctx.fillRect(r * 0.15, -r * 0.1, r * 1.5, r * 0.22);
    // Muzzle
    ctx.fillStyle = flash ? '#fff' : '#3a3a50';
    ctx.fillRect(r * 1.55, -r * 0.14, r * 0.18, r * 0.3);
    // Scope
    ctx.fillStyle = flash ? '#fff' : '#ff5a20';
    ctx.fillRect(r * 0.7, -r * 0.22, r * 0.35, r * 0.14);
    ctx.restore();

    // Legs
    ctx.fillStyle = armCol;
    ctx.fillRect(-r * 0.4, r * 0.5, r * 0.32, r * 0.6);
    ctx.fillRect(r * 0.08, r * 0.5, r * 0.32, r * 0.6);
    // Boots
    ctx.fillStyle = accentCol;
    ctx.fillRect(-r * 0.44, r * 1.05, r * 0.42, r * 0.14);
    ctx.fillRect(r * 0.04, r * 1.05, r * 0.42, r * 0.14);

    // Torso (armored)
    ctx.fillStyle = armCol;
    ctx.fillRect(-r * 0.58, -r * 0.38, r * 1.16, r * 0.9);
    // Chest plate
    ctx.fillStyle = accentCol;
    ctx.fillRect(-r * 0.52, -r * 0.34, r * 1.04, r * 0.18);
    // Chest light
    ctx.fillStyle = visorCol;
    ctx.beginPath();
    ctx.arc(0, -r * 0.08, r * 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Shoulder pads
    ctx.fillStyle = accentCol;
    ctx.fillRect(-r * 0.72, -r * 0.38, r * 0.22, r * 0.28);
    ctx.fillRect(r * 0.5, -r * 0.38, r * 0.22, r * 0.28);

    // Head / helmet
    ctx.fillStyle = armCol;
    ctx.beginPath();
    ctx.arc(0, -r * 0.66, r * 0.44, 0, Math.PI * 2);
    ctx.fill();
    // Visor
    ctx.fillStyle = visorCol;
    ctx.fillRect(-r * 0.3, -r * 0.78, r * 0.6, r * 0.24);
    // Visor shine
    ctx.fillStyle = 'rgba(255,180,140,0.35)';
    ctx.fillRect(-r * 0.26, -r * 0.76, r * 0.2, r * 0.1);
    // Helmet top stripe
    ctx.fillStyle = accentCol;
    ctx.fillRect(-r * 0.38, -r * 1.08, r * 0.76, r * 0.1);

    ctx.restore();

    ent.hitFlash = Math.max(0, ent.hitFlash - 1);
}

// ─── Draw: Bullets & Particles ────────────────────────────────
function drawBullets() {
    for (const b of bullets) {
        const isPlayer = b.owner === 'player';
        ctx.save();
        ctx.shadowColor = isPlayer ? '#ff8040' : '#ff1040';
        ctx.shadowBlur  = 10;
        ctx.fillStyle   = isPlayer ? '#ffaa60' : '#ff3060';
        ctx.beginPath();
        // Trail
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x - b.vx * 3, b.y - b.vy * 3);
        ctx.lineWidth   = 2.5;
        ctx.strokeStyle = isPlayer ? '#ff8040' : '#ff1040';
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function drawParticles() {
    for (const p of particles) {
        const a = p.life / p.maxLife;
        ctx.globalAlpha = a * 0.85;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5 + a * 2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ─── Draw: HUD ───────────────────────────────────────────────
function drawHUD() {
    const BW = W * 0.26, BH = 11, BY = 15;

    function hpBar(x, ent, right) {
        const ratio = ent.hp / ent.maxHp;
        const isDino = ent.role === 'dino';
        const col = isDino ? '#39ff14' : '#ff4500';
        const label = ent.isPlayer
            ? (isDino ? '🦖 YOU' : '⚔ YOU')
            : (isDino ? '🦖 ENEMY' : '⚔ ENEMY');

        ctx.textAlign = right ? 'right' : 'left';
        ctx.font = 'bold 10px monospace';
        ctx.fillStyle = 'rgba(200,220,255,0.65)';
        ctx.fillText(label, right ? x + BW : x, BY - 3);

        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(x, BY, BW, BH);

        ctx.fillStyle = col;
        if (right) ctx.fillRect(x + BW - BW*ratio, BY, BW*ratio, BH);
        else       ctx.fillRect(x, BY, BW*ratio, BH);

        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, BY, BW, BH);

        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`${ent.hp}/${ent.maxHp}`, x + BW/2, BY + BH + 9);
    }

    hpBar(W * 0.04, player, false);
    hpBar(W - W * 0.04 - W * 0.26, enemy, true);

    // Timer
    const rem  = Math.max(0, GAME_FRAMES - gameTimer);
    const secs = Math.ceil(rem / 60);
    const mm   = Math.floor(secs / 60);
    const ss   = secs % 60;
    ctx.fillStyle = secs <= 15 ? `rgba(255,${80 + Math.floor(Math.sin(frame*0.3)*60)},80,1)` : 'rgba(200,220,255,0.75)';
    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${mm}:${ss.toString().padStart(2,'0')}`, W/2, 24);

    // Bottom gauge
    const gx = W/2 - W*0.15, gy = H - BOT + 8, gw = W*0.3, gh = 9;

    if (playerRole === 'dino') {
        const rr = player.rage / player.maxRage;
        const full = rr >= 1;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(gx, gy, gw, gh);
        ctx.fillStyle = full ? '#39ff14' : '#1c7008';
        ctx.fillRect(gx, gy, gw * rr, gh);
        if (full) {
            ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 10;
        }
        ctx.strokeStyle = `rgba(57,255,20,${0.3 + rr*0.4})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(gx, gy, gw, gh);
        ctx.shadowBlur = 0;

        ctx.fillStyle = full ? '#39ff14' : 'rgba(120,210,80,0.55)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(full ? '⚡ RAGE READY  [Q] to charge' : `RAGE  ${Math.floor(rr*100)}%`, W/2, gy - 3);
        ctx.fillStyle = 'rgba(150,200,120,0.4)';
        ctx.fillText('[SPACE] bite · [WASD] move', W/2, H - 5);
    } else {
        const cdRatio = player.empCd > 0 ? 1 - player.empCd/180 : 1;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(gx, gy, gw, gh);
        ctx.fillStyle = cdRatio >= 1 ? '#00cfff' : '#005880';
        ctx.fillRect(gx, gy, gw * cdRatio, gh);
        ctx.strokeStyle = 'rgba(0,200,255,0.4)';
        ctx.lineWidth = 1;
        ctx.strokeRect(gx, gy, gw, gh);

        const empText = player.empCd > 0
            ? `EMP ${(player.empCd/60).toFixed(1)}s`
            : 'EMP READY';
        ctx.fillStyle = player.empCd === 0 ? '#00cfff' : 'rgba(0,180,220,0.55)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`${empText}  ·  Charges: ${player.empCharges}  [Q]`, W/2, gy - 3);
        ctx.fillStyle = 'rgba(180,140,120,0.4)';
        ctx.fillText('[CLICK] shoot · [WASD] move', W/2, H - 5);
    }

    // Difficulty badge (below timer)
    const diffLabel = difficulty === 'noob' ? 'NOOB' : difficulty === 'pro' ? 'PRO' : 'MASTER';
    const diffCol   = difficulty === 'noob' ? '#39ff14' : difficulty === 'pro' ? '#ffaa00' : '#ff2040';
    ctx.fillStyle = diffCol;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(diffLabel, W/2, 36);

    // ESC hint (bottom right, out of the way of HP bars)
    ctx.fillStyle = 'rgba(100,120,140,0.35)';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('ESC = difficulty', W - 8, H - BOT + 20);
}

// ─── Draw: Menu ──────────────────────────────────────────────
function drawMenu() {
    drawFloor();

    // Floating dino + hunter silhouettes
    const bob = Math.sin(frame * 0.04) * 5;

    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.font = `${Math.floor(H * 0.55)}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🦖', W * 0.28, H * 0.72 + bob);
    ctx.restore();

    // Scan line (animated)
    const scanY = ((frame * 1.2) % (H + 10)) - 5;
    ctx.fillStyle = 'rgba(57,255,20,0.04)';
    ctx.fillRect(0, scanY, W, 3);

    // Title
    ctx.save();
    ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 45;
    ctx.fillStyle = '#39ff14';
    ctx.font = `bold ${Math.floor(W * 0.075)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('DINOS', W/2, H * 0.30);
    ctx.restore();

    ctx.save();
    ctx.shadowColor = '#ff4500'; ctx.shadowBlur = 45;
    ctx.fillStyle = '#ff4500';
    ctx.font = `bold ${Math.floor(W * 0.075)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('VS HUNTERS', W/2, H * 0.46);
    ctx.restore();

    // Separator
    ctx.strokeStyle = 'rgba(180,100,50,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath(); ctx.moveTo(W*0.25, H*0.53); ctx.lineTo(W*0.75, H*0.53); ctx.stroke();
    ctx.setLineDash([]);

    // Lore
    ctx.fillStyle = 'rgba(160,190,220,0.55)';
    ctx.font = `${Math.floor(W * 0.018)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('GenCorp resurrected them. Now the city burns.', W/2, H * 0.61);
    ctx.fillText('Elite operators were deployed. Only one apex survives.', W/2, H * 0.67);

    // Blink prompt
    if (Math.floor(frame/28) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = `${Math.floor(W * 0.022)}px monospace`;
        ctx.fillText('[ SPACE  or  CLICK  to  begin ]', W/2, H * 0.82);
    }
}

// ─── Draw: Select ────────────────────────────────────────────
function drawSelect() {
    drawFloor();

    ctx.fillStyle = 'rgba(200,220,255,0.85)';
    ctx.font = `bold ${Math.floor(W * 0.03)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('CHOOSE  YOUR  SIDE', W/2, H * 0.14);

    const { dx, dy, hx, hy, cw, ch } = selectLayout();

    function card(cx, cy, role) {
        const hover = mouse.x >= cx && mouse.x <= cx + cw && mouse.y >= cy && mouse.y <= cy + ch;
        const isDino = role === 'dino';
        const glowCol = isDino ? '#39ff14' : '#ff4500';
        const fillCol = isDino ? 'rgba(57,255,20,0.08)' : 'rgba(255,69,0,0.08)';

        ctx.save();
        ctx.shadowColor = glowCol;
        ctx.shadowBlur  = hover ? 28 : 10;
        ctx.fillStyle   = hover ? (isDino ? 'rgba(57,255,20,0.14)' : 'rgba(255,69,0,0.14)') : fillCol;
        ctx.fillRect(cx, cy, cw, ch);
        ctx.strokeStyle = glowCol;
        ctx.lineWidth   = hover ? 2 : 1;
        ctx.strokeRect(cx, cy, cw, ch);
        ctx.restore();

        // Big emoji
        ctx.font = `${Math.floor(cw * 0.38)}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText(isDino ? '🦖' : '🪖', cx + cw/2, cy + ch * 0.40);

        // Name
        ctx.fillStyle = glowCol;
        ctx.font = `bold ${Math.floor(W * 0.026)}px monospace`;
        ctx.fillText(isDino ? 'T-REX' : 'HUNTER', cx + cw/2, cy + ch * 0.56);

        // Stats
        ctx.fillStyle = isDino ? 'rgba(160,230,120,0.7)' : 'rgba(255,160,100,0.7)';
        ctx.font = `${Math.floor(W * 0.015)}px monospace`;
        ctx.fillText(isDino ? 'HP 150  ·  SPD 3' : 'HP 100  ·  SPD 4', cx + cw/2, cy + ch * 0.67);
        ctx.fillText(isDino ? 'BITE + RAGE CHARGE' : 'PULSE RIFLE + EMP', cx + cw/2, cy + ch * 0.76);

        // Controls
        ctx.fillStyle = 'rgba(150,170,200,0.45)';
        ctx.font = `${Math.floor(W * 0.013)}px monospace`;
        ctx.fillText(isDino ? 'WASD · SPACE · Q' : 'WASD · CLICK · Q', cx + cw/2, cy + ch * 0.86);

        // Hover indicator
        if (hover) {
            ctx.fillStyle = glowCol;
            ctx.font = `bold ${Math.floor(W * 0.018)}px monospace`;
            ctx.fillText('▶  SELECT', cx + cw/2, cy + ch * 0.95);
        }
    }

    card(dx, dy, 'dino');
    card(hx, hy, 'hunter');

    ctx.fillStyle = 'rgba(120,140,160,0.4)';
    ctx.font = `${Math.floor(W * 0.015)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('Your opponent is the AI', W/2, H * 0.9);
}

// ─── Draw: Difficulty Select ─────────────────────────────────
function drawDiffSelect() {
    drawFloor();

    const roleEmoji = playerRole === 'dino' ? '🦖' : '🪖';
    const roleName  = playerRole === 'dino' ? 'T-Rex' : 'Hunter';

    ctx.fillStyle = 'rgba(200,220,255,0.85)';
    ctx.font = `bold ${Math.floor(W * 0.028)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('CHOOSE  YOUR  CHALLENGE', W/2, H * 0.13);

    ctx.fillStyle = 'rgba(160,180,210,0.5)';
    ctx.font = `${Math.floor(W * 0.016)}px monospace`;
    ctx.fillText(`Playing as: ${roleEmoji} ${roleName}  ·  ESC to change`, W/2, H * 0.20);

    const { nx, px, mx, cy, cw, ch } = diffLayout();

    const tiers = [
        { key: 'noob',   label: 'NOOB',   emoji: '🐣', col: '#39ff14',
          sub: 'AI goes easy on you',
          stats: ['Dino AI: slow & weak', 'Hunter AI: low accuracy'] },
        { key: 'pro',    label: 'PRO',    emoji: '⚔️',  col: '#ffaa00',
          sub: 'A real fight',
          stats: ['Dino AI: standard', 'Hunter AI: accurate'] },
        { key: 'master', label: 'MASTER', emoji: '💀', col: '#ff2040',
          sub: 'No mercy',
          stats: ['Dino AI: fast & brutal', 'Hunter AI: near-perfect aim'] },
    ];
    const xs = [nx, px, mx];

    tiers.forEach((t, i) => {
        const cx = xs[i];
        const hover = mouse.x >= cx && mouse.x <= cx + cw && mouse.y >= cy && mouse.y <= cy + ch;
        const active = difficulty === t.key;

        ctx.save();
        ctx.shadowColor = t.col;
        ctx.shadowBlur  = (hover || active) ? 30 : 10;
        ctx.fillStyle   = (hover || active)
            ? `rgba(${hexToRgb(t.col)},0.15)`
            : `rgba(${hexToRgb(t.col)},0.06)`;
        ctx.fillRect(cx, cy, cw, ch);
        ctx.strokeStyle = t.col;
        ctx.lineWidth   = (hover || active) ? 2 : 1;
        ctx.strokeRect(cx, cy, cw, ch);
        ctx.restore();

        // Active indicator bar
        if (active) {
            ctx.fillStyle = t.col;
            ctx.fillRect(cx, cy, cw, 3);
        }

        // Emoji
        ctx.font = `${Math.floor(cw * 0.36)}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText(t.emoji, cx + cw/2, cy + ch * 0.38);

        // Label
        ctx.fillStyle = t.col;
        ctx.font = `bold ${Math.floor(W * 0.025)}px monospace`;
        ctx.fillText(t.label, cx + cw/2, cy + ch * 0.53);

        // Subtitle
        ctx.fillStyle = `rgba(${hexToRgb(t.col)},0.75)`;
        ctx.font = `${Math.floor(W * 0.014)}px monospace`;
        ctx.fillText(t.sub, cx + cw/2, cy + ch * 0.63);

        // Stats
        ctx.fillStyle = 'rgba(160,180,210,0.55)';
        ctx.font = `${Math.floor(W * 0.012)}px monospace`;
        t.stats.forEach((s, si) => ctx.fillText(s, cx + cw/2, cy + ch * (0.74 + si * 0.09)));

        // Hover CTA
        if (hover || active) {
            ctx.fillStyle = t.col;
            ctx.font = `bold ${Math.floor(W * 0.016)}px monospace`;
            ctx.fillText(active ? '▶  SELECTED' : '▶  SELECT', cx + cw/2, cy + ch * 0.94);
        }
    });
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

// ─── Draw: Game Over ─────────────────────────────────────────
function drawGameOver() {
    // Frozen frame
    drawFloor();
    drawCover();
    drawParticles();
    if (playerRole === 'dino') { drawDino(player); drawHunter(enemy); }
    else                       { drawHunter(player); drawDino(enemy); }

    // Dark overlay
    ctx.fillStyle = 'rgba(4,6,15,0.78)';
    ctx.fillRect(0, 0, W, H);

    const won = winner === 'player';
    const col = won ? '#39ff14' : '#ff1040';

    ctx.save();
    ctx.shadowColor = col; ctx.shadowBlur = 55;
    ctx.fillStyle   = col;
    ctx.font        = `bold ${Math.floor(W * 0.088)}px monospace`;
    ctx.textAlign   = 'center';
    ctx.fillText(won ? 'VICTORY' : 'DEFEATED', W/2, H * 0.40);
    ctx.restore();

    ctx.fillStyle = 'rgba(180,200,230,0.65)';
    ctx.font = `${Math.floor(W * 0.022)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(won ? 'The apex predator reigns supreme.' : 'The hunt is over. Try again.', W/2, H * 0.55);

    if (Math.floor(frame/28) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.78)';
        ctx.font = `${Math.floor(W * 0.022)}px monospace`;
        ctx.fillText('[ ENTER  or  CLICK  to  play  again ]', W/2, H * 0.74);
    }
}

// ─── Game Init / State transitions ────────────────────────────
function initGame() {
    rebuildCover();
    if (playerRole === 'dino') {
        player = makeDino(W * 0.22, H * 0.5, true);
        enemy  = makeHunter(W * 0.78, H * 0.5, false);
    } else {
        player = makeHunter(W * 0.78, H * 0.5, true);
        enemy  = makeDino(W * 0.22, H * 0.5, false);
    }
    bullets = []; particles = [];
    gameTimer = 0; screenShake = 0;
}

function goSelect() { state = 'select'; }

function startGame(role) {
    playerRole = role;
    state = 'diffselect';
}

function startWithDifficulty(level) {
    difficulty = level;
    state = 'playing';
    initGame();
}

// ─── Main Loop ───────────────────────────────────────────────
function update() {
    frame++;
    if (screenShake > 0) screenShake = Math.max(0, screenShake - 0.7);

    if (state !== 'playing') { clickThisFrame = false; return; }

    gameTimer++;
    if (gameTimer >= GAME_FRAMES) {
        const pr = player.hp / player.maxHp;
        const er = enemy.hp  / enemy.maxHp;
        winner = pr >= er ? 'player' : 'enemy';
        state = 'gameover';
        clickThisFrame = false;
        return;
    }

    if (playerRole === 'dino')    updatePlayerDino();
    else                          updatePlayerHunter();
    if (playerRole === 'dino')    updateHunterAI();
    else                          updateDinoAI();

    updateBullets();
    updateParticles();

    if (player.hp <= 0) { winner = 'enemy';  state = 'gameover'; }
    if (enemy.hp  <= 0) { winner = 'player'; state = 'gameover'; }

    clickThisFrame = false;
}

function draw() {
    if (screenShake > 1) {
        ctx.save();
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
    }

    if      (state === 'menu')       drawMenu();
    else if (state === 'select')     drawSelect();
    else if (state === 'diffselect') drawDiffSelect();
    else if (state === 'gameover')   drawGameOver();
    else {
        drawFloor();
        drawCover();
        drawParticles();
        drawBullets();
        if (playerRole === 'dino') { drawDino(player); drawHunter(enemy); }
        else                       { drawHunter(player); drawDino(enemy); }
        drawHUD();
    }

    if (screenShake > 1) ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Keyboard shortcuts: ESC navigates back one screen
window.addEventListener('keydown', e => {
    if (e.code === 'Escape' && state === 'playing')   { state = 'diffselect'; }
    if (e.code === 'Escape' && state === 'diffselect') { state = 'select'; }
});

rebuildCover();
loop();
</script>
</body>
</html>
